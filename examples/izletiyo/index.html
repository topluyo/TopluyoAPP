<script>
var TopluyoAPI = TopluyoAPI || {}
TopluyoAPI.Youtube = {}
TopluyoAPI.Youtube.API_KEY = "AIzaSyAhkQ4yx-x0haEHRAfKP3bOeKJVzCOih1I"
TopluyoAPI.Youtube.SearchFilm = function(query){

  return new Promise(res=>{
    const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=24&q=${encodeURIComponent(query + ' full movie')}&key=${TopluyoAPI.Youtube.API_KEY}`;
    fetch(searchUrl).then(e=>e.json()).then(searchData=>{  
      res(searchData.items.map(e=>({"id":e.id.videoId,"title":e.snippet.title,"image":"https://i.ytimg.com/vi/"+e.id.videoId+"/mqdefault.jpg"})))
    })
  })
}

TopluyoAPI.Youtube.GetID = function(url){
  const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
  const match = url.match(regex);
  return match ? match[1] : null;
}

</script>

function render_list(obj){
  $("[results]").innerHTML = Object.entries(obj).map(entrie=>{
    return `
      <div result flex-y gap onclick='render_films($DATA[${JSON.stringify(entrie[0])}]["videos"])'>
        <img src="https://i.ytimg.com/vi/${entrie[1].image}/mqdefault.jpg" style="width:100%">
        <div flex-y="">
          <b result-title="">${entrie[0]}</b>
          <!--<b result-duration=""></b>-->
        </div>
      </div>
    `
  }).join("")
}


function render_films(obj){
  $("[results]").innerHTML = Object.entries(obj).map(entrie=>{
    return `
      <div result flex-y gap onclick="watch_film('${entrie[0]}')">

function render_search(list){

}

current = null
is_host = false
function watch_film(url){
  onPlayerReady = function(){
    TopluyoAPP.up("<signal/broadcast",{data:{play:url}})
  }
  
  onPlayerStateChange = function (event){
    playerState = event.data
    if (event.data == YT.PlayerState.PLAYING){
      TopluyoAPP.up("<signal/broadcast",{data:{seek:player.getCurrentTime()}})
    }
    if (event.data == YT.PlayerState.PAUSED){
      TopluyoAPP.up("<signal/broadcast",{data:{pause:player.getCurrentTime()}})
    }
  }
  is_host=true
  $("#results")?.remove();let frame = document.createElement("div");frame.id = "results";$("[results]").appendChild(frame);

  window.player = new YT.Player('results', {
    height: '360',
    width: '640',
    videoId: current=url,
    playerVars: {
      'playsinline': 1,
      "autoplay" : 1,
      "muted": 1
    },
    events: {
      'onReady': onPlayerReady,
      'onStateChange': onPlayerStateChange
    }
  });
  return;
}

TopluyoAPP.on(">signal/user",function(data,source){
  if(!is_host){
    TopluyoAPP.up("<signal/broadcast",{data:{where:1}})
  }
})

TopluyoAPP.on(">signal/message",function(data,source){
  if(data.play && current!=data.play){
    is_host=false
    $("#results")?.remove();let frame = document.createElement("div");frame.id = "results";$("[results]").appendChild(frame);
    window.player = new YT.Player('results', {
      height: '360',
      width: '640',
      videoId: data.play,
      playerVars: {
        'playsinline': 1,
        "autoplay" : 1,
        "muted": 1
      },events: {
      'onReady': ()=>{
        player.seekTo(data.seek)
        player.playVideo()
      }
      }
    });
  }
  if(data.seek && !is_host){
    player.seekTo(data.seek)
    player.playVideo()
  }
  if(data.pause && !is_host){
    player.seekTo(data.pause)
    player.pauseVideo()
  }
  if(data.where && is_host){
    TopluyoAPP.up("<signal/direct",{source:source,data:{play:current,seek:player.getCurrentTime()}})
  }
})
